name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/logs
          npm test 2>&1 | tee artifacts/logs/unit-tests.log

      - name: Run e2e tests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/logs

          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [[ -z "${REPO_NAME}" || "${REPO_NAME}" == *.github.io ]]; then
            BASE_PATH="/"
          else
            BASE_PATH="/${REPO_NAME}/"
          fi

          BASE_URL="http://127.0.0.1:4173${BASE_PATH}"
          npm run preview -- --host 127.0.0.1 --port 4173 > artifacts/logs/preview.log 2>&1 &

          for i in {1..30}; do
            if curl -fsS "${BASE_URL}" > /dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS "${BASE_URL}" > /dev/null
          BASE_URL="${BASE_URL}" npm run test:e2e 2>&1 | tee artifacts/logs/e2e-tests.log

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            artifacts
            playwright-report
            test-results
          if-no-files-found: warn
          overwrite: true

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          overwrite: true

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build-and-test
    runs-on: ubuntu-latest
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
